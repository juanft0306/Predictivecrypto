<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoAlert - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        * { font-family: 'Inter', sans-serif; }
        body { background: radial-gradient(ellipse at top, #0f172a, #020617); min-height: 100vh; padding: 1.5rem; padding-bottom: 6rem; }
        .glass-card { background: rgba(30,41,59,0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 8px 32px rgba(0,0,0,0.4); transition: all 0.3s ease; }
        .glass-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.6); border-color: rgba(99,102,241,0.3); }
        .btn-gradient { background: linear-gradient(135deg, #6366f1, #8b5cf6); transition: all 0.3s ease; }
        .btn-gradient:hover { transform: scale(1.02); box-shadow: 0 0 30px rgba(99,102,241,0.4); }
        .btn-gradient:active { transform: scale(0.98); }
        .badge-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
        .estado-badge { background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.2); padding: 0.2rem 0.8rem; border-radius: 9999px; font-size: 0.7rem; font-weight: 600; color: #a5b4fc; }
        .statu-text { color: #94a3b8; font-size: 0.75rem; }
        .menu-toggle { cursor: pointer; display: flex; flex-direction: column; gap: 4px; padding: 4px; }
        .menu-toggle span { display: block; width: 24px; height: 2px; background: #94a3b8; transition: all 0.3s ease; border-radius: 9999px; }
        .menu-toggle:hover span { background: #a5b4fc; }
        .menu-toggle.active span:nth-child(1) { transform: rotate(45deg) translate(4px, 4px); }
        .menu-toggle.active span:nth-child(2) { opacity: 0; }
        .menu-toggle.active span:nth-child(3) { transform: rotate(-45deg) translate(4px, -4px); }
        .menu-dropdown { display: none; position: absolute; top: 100%; right: 0; background: rgba(30,41,59,0.95); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); padding: 0.5rem 0; min-width: 180px; z-index: 50; }
        .menu-dropdown.open { display: block; }
        .menu-dropdown a { display: block; padding: 0.5rem 1rem; color: #94a3b8; text-decoration: none; font-size: 0.9rem; transition: all 0.2s; }
        .menu-dropdown a:hover { background: rgba(99,102,241,0.1); color: #a5b4fc; }
        .menu-dropdown a.active { color: #818cf8; font-weight: 600; }
        .menu-wrapper { position: relative; }
        .btn-flotante { position: fixed; bottom: 2rem; right: 2rem; z-index: 9999; box-shadow: 0 4px 20px rgba(99,102,241,0.5); padding: 0.75rem 1.5rem; border-radius: 9999px; font-size: 1rem; }
        @media (max-width: 640px) { .btn-flotante { bottom: 1rem; right: 1rem; padding: 0.6rem 1.2rem; font-size: 0.85rem; } }
        .table-crypto td, .table-crypto th { padding: 0.5rem 0.3rem; }
        .table-crypto tr { border-bottom: 1px solid rgba(255,255,255,0.05); }
        .table-crypto tr:last-child { border-bottom: none; }
        .crypto-name { font-weight: 600; color: #f1f5f9; }
        .crypto-symbol { font-size: 0.65rem; color: #64748b; margin-left: 0.2rem; }
        .prob-bar { height: 6px; border-radius: 9999px; background: #1e293b; overflow: hidden; }
        .prob-fill { height: 100%; border-radius: 9999px; transition: width 0.5s ease; }
        .tag-recomendacion { font-size: 0.7rem; font-weight: 600; padding: 0.15rem 0.6rem; border-radius: 9999px; display: inline-block; }
    </style>
</head>
<body>
    <div class="max-w-6xl mx-auto">
        <!-- HEADER -->
        <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
            <h1 class="text-4xl font-extrabold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">
                <i class="fas fa-chart-line text-indigo-400 mr-2"></i>CryptoAlert
            </h1>
            <div class="flex items-center gap-3">
                <div class="menu-wrapper">
                    <div class="menu-toggle" id="menuToggle">
                        <span></span><span></span><span></span>
                    </div>
                    <div class="menu-dropdown" id="menuDropdown">
                        <a href="/" class="active">Dashboard</a>
                        <a href="/inversion">Mi Inversión</a>
                        <a href="/consejos">Consejos</a>
                        <a href="/historial">Historial</a>
                        <a href="/asistente">Asistente</a>
                    </div>
                </div>
                <span class="estado-badge hidden sm:inline-block">
                    <i class="fas fa-circle text-emerald-400 text-xs mr-1"></i> Conectado
                </span>
            </div>
        </div>

        <!-- HORA Y ESTADO -->
        <div class="flex flex-wrap items-center justify-between gap-4 mb-4 text-xs text-slate-500">
            <span><i class="far fa-clock mr-1"></i> Venezuela: <span id="hora-actual">--:--</span></span>
            <span><i class="fas fa-sync-alt mr-1 text-emerald-400/70"></i> Última: <span id="ultima-actualizacion">--</span></span>
            <span><i class="fas fa-bolt text-emerald-400/70 mr-1"></i> Cada 5s</span>
        </div>

        <!-- TABLA PRINCIPAL -->
        <div class="glass-card rounded-3xl p-4 md:p-6">
            <div class="overflow-x-auto">
                <table class="table-crypto w-full text-sm">
                    <thead>
                        <tr class="text-left text-slate-400 border-b border-slate-700/50">
                            <th class="font-medium">Moneda</th>
                            <th class="font-medium text-right">Precio</th>
                            <th class="font-medium text-right">24h</th>
                            <th class="font-medium text-right">RSI</th>
                            <th class="font-medium text-right">Prob. Subida</th>
                            <th class="font-medium text-center">Recomendación</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-cuerpo">
                        <!-- JS llena -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- DESTACADOS -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">
            <div class="glass-card rounded-2xl p-5">
                <p class="text-slate-400 text-xs uppercase tracking-wider">🚀 Mejor oportunidad de subida</p>
                <p class="text-xl font-bold text-emerald-400" id="mejor-subida-nombre">--</p>
                <div class="prob-bar mt-2"><div class="prob-fill bg-emerald-400" id="mejor-subida-bar" style="width:0%"></div></div>
                <span class="text-xs text-slate-500" id="mejor-subida-prob">0%</span>
            </div>
            <div class="glass-card rounded-2xl p-5">
                <p class="text-slate-400 text-xs uppercase tracking-wider">🔻 Mayor riesgo de bajada</p>
                <p class="text-xl font-bold text-red-400" id="mejor-baja-nombre">--</p>
                <div class="prob-bar mt-2"><div class="prob-fill bg-red-400" id="mejor-baja-bar" style="width:0%"></div></div>
                <span class="text-xs text-slate-500" id="mejor-baja-prob">0%</span>
            </div>
        </div>
    </div>

    <button id="btn-alerta" class="btn-flotante btn-gradient text-white font-bold shadow-lg flex items-center gap-2">
        <i class="fas fa-paper-plane"></i> <span>Enviar alerta</span>
    </button>

    <script>
        document.getElementById('menuToggle').addEventListener('click', function() {
            this.classList.toggle('active');
            document.getElementById('menuDropdown').classList.toggle('open');
        });
        document.addEventListener('click', function(e) {
            const wrapper = document.querySelector('.menu-wrapper');
            if (!wrapper.contains(e.target)) {
                document.getElementById('menuToggle').classList.remove('active');
                document.getElementById('menuDropdown').classList.remove('open');
            }
        });

        document.getElementById('btn-alerta').addEventListener('click', async function() {
            const orig = this.innerHTML;
            this.disabled = true;
            this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando...';
            try {
                const resp = await fetch('/api/enviar_alerta', { method: 'POST' });
                const data = await resp.json();
                alert(data.status === 'ok' ? '✅ Alerta enviada' : '❌ ' + data.mensaje);
            } catch(e) { alert('❌ Error'); }
            finally {
                this.disabled = false;
                this.innerHTML = orig;
            }
        });

        const source = new EventSource('/api/stream');
        source.onmessage = (e) => {
            const data = JSON.parse(e.data);
            const d = data.datos;
            document.getElementById('hora-actual').innerText = data.hora_actual || '--:--';
            document.getElementById('ultima-actualizacion').innerText = d['BTCUSDT']?.ultima_actualizacion || '--';

            const tbody = document.getElementById('tabla-cuerpo');
            let html = '';
            let mejorSubida = { nombre: '', prob: 0 };
            let mejorBaja = { nombre: '', prob: 0 };

            for (const [symbol, info] of Object.entries(d)) {
                const precio = info.precio_actual || 0;
                const variacion = info.variacion || 0;
                const rsi = info.rsi || 50;
                const probS = info.prob_subida || 50;
                const probB = info.prob_bajada || 50;
                const recom = info.recomendacion || 'Neutral';
                const emoji = info.emoji || '⚪';
                const varColor = variacion >= 0 ? 'text-emerald-400' : 'text-red-400';
                const varSign = variacion >= 0 ? '+' : '';
                const rsiColor = rsi < 30 ? 'text-blue-400' : rsi > 70 ? 'text-red-400' : 'text-amber-400';
                let tagClass = 'bg-slate-700/50 text-slate-300';
                if (recom.includes('COMPRA FUERTE')) tagClass = 'bg-emerald-500/30 text-emerald-300';
                else if (recom.includes('COMPRA')) tagClass = 'bg-emerald-500/20 text-emerald-300';
                else if (recom.includes('VENTA FUERTE')) tagClass = 'bg-red-500/30 text-red-300';
                else if (recom.includes('VENTA')) tagClass = 'bg-red-500/20 text-red-300';
                else if (recom.includes('MANTENER')) tagClass = 'bg-blue-500/20 text-blue-300';

                html += `<tr>
                    <td class="crypto-name">${info.nombre} <span class="crypto-symbol">${symbol.replace('USDT','')}</span></td>
                    <td class="text-right text-white font-medium">$${precio.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}</td>
                    <td class="text-right font-semibold ${varColor}">${varSign}${variacion.toFixed(2)}%</td>
                    <td class="text-right ${rsiColor}">${rsi.toFixed(2)}</td>
                    <td class="text-right"><div class="flex items-center justify-end gap-2"><span class="text-sm font-bold ${probS >= 70 ? 'text-emerald-400' : probS <= 30 ? 'text-red-400' : 'text-white'}">${probS.toFixed(1)}%</span><div class="prob-bar w-12"><div class="prob-fill bg-emerald-400" style="width:${probS}%"></div></div></div></td>
                    <td class="text-center"><span class="tag-recomendacion ${tagClass}">${emoji} ${recom}</span></td>
                </tr>`;

                if (probS > mejorSubida.prob) { mejorSubida = { nombre: info.nombre, prob: probS }; }
                if (probB > mejorBaja.prob) { mejorBaja = { nombre: info.nombre, prob: probB }; }
            }
            tbody.innerHTML = html;
            document.getElementById('mejor-subida-nombre').innerText = mejorSubida.nombre || '--';
            document.getElementById('mejor-subida-bar').style.width = mejorSubida.prob + '%';
            document.getElementById('mejor-subida-prob').innerText = mejorSubida.prob.toFixed(1) + '%';
            document.getElementById('mejor-baja-nombre').innerText = mejorBaja.nombre || '--';
            document.getElementById('mejor-baja-bar').style.width = mejorBaja.prob + '%';
            document.getElementById('mejor-baja-prob').innerText = mejorBaja.prob.toFixed(1) + '%';
        };
    </script>
</body>
</html>
