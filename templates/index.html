<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CryptoAlert Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        /* ============================================================
           ESTILOS BASE
           ============================================================ */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        * { font-family: 'Inter', sans-serif; }
        body {
            background: radial-gradient(ellipse at top, #0f172a, #020617);
            min-height: 100vh;
            padding: 1.5rem;
            padding-bottom: 6rem;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.6);
            border-color: rgba(99,102,241,0.3);
        }
        .price-glow { text-shadow: 0 0 40px rgba(52,211,153,0.2); }
        .badge-pulse { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }
        .btn-gradient {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            transition: all 0.3s ease;
        }
        .btn-gradient:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(99,102,241,0.4);
        }
        .btn-gradient:active { transform: scale(0.98); }
        .historico-item {
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }
        .historico-item:hover {
            background: rgba(99,102,241,0.05);
            border-left-color: #6366f1;
            padding-left: 0.5rem;
        }
        .rsi-neutral { color: #fbbf24; }
        .rsi-sobrevendido { color: #60a5fa; }
        .rsi-sobrecomprado { color: #f87171; }
        .estado-badge {
            background: rgba(99,102,241,0.15);
            border: 1px solid rgba(99,102,241,0.2);
            padding: 0.2rem 0.8rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #a5b4fc;
        }
        .statu-text { color: #94a3b8; font-size: 0.75rem; }
        .menu-toggle {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 4px;
        }
        .menu-toggle span {
            display: block;
            width: 24px;
            height: 2px;
            background: #94a3b8;
            transition: all 0.3s ease;
            border-radius: 9999px;
        }
        .menu-toggle:hover span { background: #a5b4fc; }
        .menu-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(4px, 4px);
        }
        .menu-toggle.active span:nth-child(2) { opacity: 0; }
        .menu-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(4px, -4px);
        }
        .menu-dropdown {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            background: rgba(30,41,59,0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            padding: 0.5rem 0;
            min-width: 150px;
            z-index: 50;
        }
        .menu-dropdown.open { display: block; }
        .menu-dropdown a {
            display: block;
            padding: 0.5rem 1rem;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .menu-dropdown a:hover {
            background: rgba(99,102,241,0.1);
            color: #a5b4fc;
        }
        .menu-dropdown a.active {
            color: #818cf8;
            font-weight: 600;
        }
        .menu-wrapper { position: relative; }
        .btn-flotante {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 9999;
            box-shadow: 0 4px 20px rgba(99,102,241,0.5);
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            font-size: 1rem;
        }
        @media (max-width: 640px) {
            .btn-flotante {
                bottom: 1rem;
                right: 1rem;
                padding: 0.6rem 1.2rem;
                font-size: 0.85rem;
            }
            .btn-flotante span { display: inline; }
        }
        select {
            background-color: #1e293b;
            color: white;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            outline: none;
        }
        select:focus { border-color: #6366f1; }
        .moneda-badge {
            display: inline-block;
            background: rgba(99,102,241,0.15);
            padding: 0.15rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            color: #a5b4fc;
        }
        .table-crypto td, .table-crypto th {
            padding: 0.5rem 0.3rem;
        }
        .table-crypto tr {
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .table-crypto tr:last-child { border-bottom: none; }
        .crypto-name { font-weight: 600; color: #f1f5f9; }
        .crypto-symbol { font-size: 0.65rem; color: #64748b; margin-left: 0.2rem; }
    </style>
</head>
