<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoAlert - Consejos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        * { font-family: 'Inter', sans-serif; }
        body { background: radial-gradient(ellipse at top, #0f172a, #020617); min-height: 100vh; padding: 1.5rem; padding-bottom: 6rem; }
        .glass-card { background: rgba(30,41,59,0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 8px 32px rgba(0,0,0,0.4); transition: all 0.3s ease; }
        .glass-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.6); border-color: rgba(99,102,241,0.3); }
        .btn-gradient { background: linear-gradient(135deg, #6366f1, #8b5cf6); transition: all 0.3s ease; }
        .btn-gradient:hover { transform: scale(1.02); box-shadow: 0 0 30px rgba(99,102,241,0.4); }
        .btn-gradient:active { transform: scale(0.98); }
        .badge-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
        .menu-toggle { cursor: pointer; display: flex; flex-direction: column; gap: 4px; padding: 4px; }
        .menu-toggle span { display: block; width: 24px; height: 2px; background: #94a3b8; transition: all 0.3s ease; border-radius: 9999px; }
        .menu-toggle:hover span { background: #a5b4fc; }
        .menu-toggle.active span:nth-child(1) { transform: rotate(45deg) translate(4px, 4px); }
        .menu-toggle.active span:nth-child(2) { opacity: 0; }
        .menu-toggle.active span:nth-child(3) { transform: rotate(-45deg) translate(4px, -4px); }
        .menu-dropdown { display: none; position: absolute; top: 100%; right: 0; background: rgba(30,41,59,0.95); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); padding: 0.5rem 0; min-width: 180px; z-index: 50; }
        .menu-dropdown.open { display: block; }
        .menu-dropdown a { display: block; padding: 0.5rem 1rem; color: #94a3b8; text-decoration: none; font-size: 0.9rem; transition: all 0.2s; }
        .menu-dropdown a:hover { background: rgba(99,102,241,0.1); color: #a5b4fc; }
        .menu-dropdown a.active { color: #818cf8; font-weight: 600; }
        .menu-wrapper { position: relative; }
        .btn-flotante { position: fixed; bottom: 2rem; right: 2rem; z-index: 9999; box-shadow: 0 4px 20px rgba(99,102,241,0.5); padding: 0.75rem 1.5rem; border-radius: 9999px; font-size: 1rem; }
        @media (max-width: 640px) { .btn-flotante { bottom: 1rem; right: 1rem; padding: 0.6rem 1.2rem; font-size: 0.85rem; } }
        select { background-color: #1e293b; color: white; border: 1px solid #334155; border-radius: 0.5rem; padding: 0.5rem 1rem; font-size: 0.9rem; outline: none; }
        select:focus { border-color: #6366f1; }
        .tag-recomendacion { font-size: 0.75rem; font-weight: 600; padding: 0.2rem 0.8rem; border-radius: 9999px; display: inline-block; }
        .indicador-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 0.5rem; }
        .indicador-item { background: rgba(30,41,59,0.4); padding: 0.5rem; border-radius: 0.5rem; text-align: center; }
        .indicador-item .label { font-size: 0.6rem; color: #94a3b8; text-transform: uppercase; }
        .indicador-item .value { font-size: 0.85rem; font-weight: 700; color: #f1f5f9; }
    </style>
</head>
<body>
    <div class="max-w-6xl mx-auto">
        <!-- HEADER -->
        <div class="flex flex-wrap items-center justify-between gap-4 mb-8">
            <h1 class="text-2xl font-bold text-white"><i class="fas fa-lightbulb text-amber-400 mr-2"></i>CryptoAlert - Consejos</h1>
            <div class="flex items-center gap-3">
                <div class="menu-wrapper">
                    <div class="menu-toggle" id="menuToggle">
                        <span></span><span></span><span></span>
                    </div>
                    <div class="menu-dropdown" id="menuDropdown">
                        <a href="/">Dashboard</a>
                        <a href="/inversion">Mi Inversión</a>
                        <a href="/consejos" class="active">Consejos</a>
                        <a href="/historial">Historial</a>
                        <a href="/asistente">Asistente</a>
                    </div>
                </div>
                <span class="flex items-center gap-2 text-xs text-slate-400">
                    <span class="inline-block w-2 h-2 bg-emerald-400 rounded-full badge-pulse"></span>
                    <span id="estado-conexion" class="hidden sm:inline">Conectado</span>
                </span>
            </div>
        </div>

        <!-- FILTRO -->
        <div class="mb-6 flex flex-wrap items-center justify-between gap-4">
            <h2 class="text-3xl font-bold text-white"><i class="fas fa-brain text-amber-400 mr-2"></i>Recomendaciones</h2>
            <div class="flex items-center gap-2">
                <span class="text-slate-400 text-sm">Filtrar:</span>
                <select id="selector-filtro" class="bg-slate-800 border border-slate-700 text-white rounded-lg px-3 py-2 text-sm">
                    <option value="todas">Todas</option>
                    <option value="compra">Compra</option>
                    <option value="venta">Venta</option>
                    <option value="mantener">Mantener</option>
                </select>
            </div>
        </div>

        <!-- SEÑAL FUERTE -->
        <div class="glass-card rounded-2xl p-5 mb-6">
            <p class="text-slate-400 text-xs uppercase">🚀 Señal más fuerte del momento</p>
            <div class="flex items-center justify-between flex-wrap gap-2 mt-1">
                <span class="text-2xl font-bold text-white" id="senal-nombre">Esperando...</span>
                <span class="tag-recomendacion" id="senal-tag">--</span>
                <span class="text-sm text-slate-400" id="senal-prob">0%</span>
            </div>
            <div class="mt-2 text-xs text-slate-500" id="senal-detalle">--</div>
        </div>

        <!-- TARJETAS -->
        <div id="consejos-container" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>

    <button id="btn-alerta" class="btn-flotante btn-gradient text-white font-bold shadow-lg flex items-center gap-2">
        <i class="fas fa-paper-plane"></i> <span>Enviar alerta</span>
    </button>

    <script>
        // Menú
        document.getElementById('menuToggle').addEventListener('click', function(){ this.classList.toggle('active'); document.getElementById('menuDropdown').classList.toggle('open'); });
        document.addEventListener('click', function(e){ const w=document.querySelector('.menu-wrapper'); if(!w.contains(e.target)){ document.getElementById('menuToggle').classList.remove('active'); document.getElementById('menuDropdown').classList.remove('open'); } });

        document.getElementById('btn-alerta').addEventListener('click', async function(){ const orig=this.innerHTML; this.disabled=true; this.innerHTML='<i class="fas fa-spinner fa-spin"></i> Enviando...'; try{ const resp=await fetch('/api/enviar_alerta',{method:'POST'}); const data=await resp.json(); alert(data.status==='ok'?'✅ Alerta enviada':'❌ '+data.mensaje); }catch(e){ alert('❌ Error'); }finally{ this.disabled=false; this.innerHTML=orig; } });

        const filtro=document.getElementById('selector-filtro');
        const source=new EventSource('/api/stream');
        source.onmessage=(e)=>{
            const data=JSON.parse(e.data);
            const d=data.datos;
            let mejor={nombre:'',prob:0,recom:'',detalles:'',tagClass:''};
            let html='';
            const filter=filtro.value;
            for(const [symbol,info] of Object.entries(d)){
                const probS=info.prob_subida||50, probB=info.prob_bajada||50, recom=info.recomendacion||'Neutral', emoji=info.emoji||'⚪';
                const rsi=info.rsi||50, macd=info.macd||0, senal=info.senal_macd||0, bS=info.banda_superior||0, bI=info.banda_inferior||0, s7=info.sma7||0, s25=info.sma25||0, s200=info.sma200||0;
                let tagClass='bg-slate-700/50 text-slate-300';
                if(recom.includes('COMPRA FUERTE')) tagClass='bg-emerald-500/30 text-emerald-300 border border-emerald-500/30';
                else if(recom.includes('COMPRA')) tagClass='bg-emerald-500/20 text-emerald-300';
                else if(recom.includes('VENTA FUERTE')) tagClass='bg-red-500/30 text-red-300 border border-red-500/30';
                else if(recom.includes('VENTA')) tagClass='bg-red-500/20 text-red-300';
                else if(recom.includes('MANTENER')) tagClass='bg-blue-500/20 text-blue-300';

                const probFuerte=Math.max(probS,probB);
                if(probFuerte>mejor.prob && probFuerte>60){ mejor={nombre:info.nombre,prob:probFuerte,recom:recom,detalles:`RSI: ${rsi.toFixed(1)} | Subida: ${probS.toFixed(1)}% | Bajada: ${probB.toFixed(1)}%`,tagClass:tagClass,emoji:emoji}; }

                if(filter==='compra' && !recom.includes('COMPRA')) continue;
                if(filter==='venta' && !recom.includes('VENTA')) continue;
                if(filter==='mantener' && !recom.includes('MANTENER')) continue;

                html+=`<div class="glass-card rounded-2xl p-5">
                    <div class="flex items-center justify-between mb-2"><span class="text-lg font-bold text-white">${info.nombre} <span class="text-xs text-slate-500">${symbol.replace('USDT','')}</span></span><span class="tag-recomendacion ${tagClass}">${emoji} ${recom}</span></div>
                    <div class="indicador-grid text-xs">
                        <div class="indicador-item"><span class="label">Precio</span><div class="value">$${info.precio_actual?.toLocaleString()||0}</div></div>
                        <div class="indicador-item"><span class="label">RSI</span><div class="value ${rsi<30?'text-blue-400':rsi>70?'text-red-400':'text-amber-400'}">${rsi.toFixed(1)}</div></div>
                        <div class="indicador-item"><span class="label">MACD</span><div class="value ${macd>senal?'text-emerald-400':'text-red-400'}">${macd.toFixed(4)}</div></div>
                        <div class="indicador-item"><span class="label">SMA7</span><div class="value">${s7.toFixed(2)}</div></div>
                        <div class="indicador-item"><span class="label">SMA25</span><div class="value">${s25.toFixed(2)}</div></div>
                        <div class="indicador-item"><span class="label">SMA200</span><div class="value">${s200.toFixed(2)}</div></div>
                        <div class="indicador-item"><span class="label">Bollinger</span><div class="value">${bI.toFixed(2)} / ${bS.toFixed(2)}</div></div>
                        <div class="indicador-item"><span class="label">Cruce</span><div class="value ${info.golden_cross?'text-emerald-400':info.death_cross?'text-red-400':'text-slate-400'}">${info.golden_cross?'🟢 Golden':info.death_cross?'🔴 Death':'⚪ Neutral'}</div></div>
                    </div>
                    <div class="mt-3 flex justify-between text-xs"><span class="text-emerald-400">↑ ${probS.toFixed(1)}%</span><span class="text-red-400">↓ ${probB.toFixed(1)}%</span><span class="text-slate-500">${info.hora_venezuela||'--'}</span></div>
                </div>`;
            }
            if(mejor.nombre){ document.getElementById('senal-nombre').innerText=mejor.nombre; document.getElementById('senal-tag').innerHTML=mejor.recom; document.getElementById('senal-tag').className='tag-recomendacion '+mejor.tagClass; document.getElementById('senal-prob').innerText=mejor.prob.toFixed(1)+'%'; document.getElementById('senal-detalle').innerText=mejor.detalles; }
            document.getElementById('consejos-container').innerHTML=html||'<p class="text-slate-500 col-span-2 text-center py-8">No hay recomendaciones con este filtro</p>';
        };
        filtro.addEventListener('change', function(){ document.getElementById('consejos-container').innerHTML='<p class="text-slate-500 text-center py-8">Cargando...</p>'; });
    </script>
</body>
</html>
