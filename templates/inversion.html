<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CryptoAlert - Seguimiento de Inversión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* ... (mismos estilos que antes, más el botón flotante y el padding) ... */
        /* Mismo código CSS que en index.html, adaptado para inversión */
        /* Para no repetir, aquí pondría el mismo CSS, pero con las clases específicas de inversión */
        /* En la práctica, podemos mover todo a un archivo CSS común, pero por simplicidad lo dejo inline */
        .btn-flotante {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 9999;
            box-shadow: 0 4px 20px rgba(99,102,241,0.4);
        }
        .contenido-principal {
            padding-top: 4rem;
        }
        @media (max-width: 640px) {
            .btn-flotante {
                top: 0.5rem;
                right: 0.5rem;
                padding: 0.5rem 0.75rem;
                font-size: 0.75rem;
            }
            .btn-flotante span {
                display: none;
            }
            .btn-flotante i {
                margin-right: 0;
            }
            .contenido-principal {
                padding-top: 3.5rem;
            }
        }
        /* ... resto de estilos ya existentes ... */
    </style>
</head>
<body>
    <div class="contenido-principal max-w-6xl mx-auto">
        <!-- HEADER sin el botón, solo menú hamburguesa y estado -->
        <div class="flex flex-wrap items-center justify-between gap-4 mb-8">
            <div class="flex items-center gap-4">
                <h1 class="text-2xl font-bold text-white flex items-center gap-2">
                    <i class="fas fa-chart-line text-indigo-400"></i> CryptoAlert
                </h1>
            </div>
            <div class="flex items-center gap-3">
                <div class="menu-wrapper">
                    <div class="menu-toggle" id="menuToggle">
                        <span></span><span></span><span></span>
                    </div>
                    <div class="menu-dropdown" id="menuDropdown">
                        <a href="/">Dashboard</a>
                        <a href="/inversion" class="active">Mi Inversión</a>
                    </div>
                </div>
                <span class="flex items-center gap-2 text-xs text-slate-400">
                    <span class="inline-block w-2 h-2 bg-emerald-400 rounded-full badge-pulse"></span>
                    <span id="estado-conexion" class="hidden sm:inline">Conectado</span>
                </span>
            </div>
        </div>

        <!-- EL RESTO DEL CONTENIDO DE INVERSIÓN (sin cambios) -->
        <!-- ... -->

    </div>

    <!-- BOTÓN FLOTANTE -->
    <button id="btn-alerta-flotante" class="btn-flotante btn-gradient text-white font-bold py-2.5 px-5 rounded-xl text-sm shadow-lg flex items-center gap-2">
        <i class="fas fa-paper-plane"></i> <span>Enviar alerta</span>
    </button>

    <script>
        // Menú hamburguesa (igual que antes)
        document.getElementById('menuToggle').addEventListener('click', function() {
            this.classList.toggle('active');
            document.getElementById('menuDropdown').classList.toggle('open');
        });
        document.addEventListener('click', function(e) {
            const wrapper = document.querySelector('.menu-wrapper');
            if (!wrapper.contains(e.target)) {
                document.getElementById('menuToggle').classList.remove('active');
                document.getElementById('menuDropdown').classList.remove('open');
            }
        });

        // Botón flotante
        document.getElementById('btn-alerta-flotante').addEventListener('click', async function() {
            const original = this.innerHTML;
            this.disabled = true;
            this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando...';
            try {
                const resp = await fetch('/api/enviar_alerta', { method: 'POST' });
                const data = await resp.json();
                alert(data.status === 'ok' ? '✅ Alerta enviada' : '❌ ' + data.mensaje);
            } catch (err) {
                alert('❌ Error al enviar la alerta');
            } finally {
                this.disabled = false;
                this.innerHTML = original;
            }
        });

        // Aquí iría el resto del código JavaScript de inversión (gráficos, SSE, etc.)
        // Como ya lo tienes en inversion.js, no lo repito.
    </script>
    <script src="{{ url_for('static', filename='inversion.js') }}"></script>
</body>
</html>
